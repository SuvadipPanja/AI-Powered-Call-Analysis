# Docker Compose file for AI-Powered Call Analysis project
# Maintained by: Suvadip Panja

services:

  db:
    image: call-analysis-db
    container_name: ai_call_db
    ports:
      - "1433:1433"
    volumes:
      - ai-call-db-data:/var/opt/mssql
    networks:
      - ai-call-network
    restart: unless-stopped

  backend:
    image: ai-call-backend
    container_name: ai_call_backend
    ports:
      - "5000:5000"
     # - "8080:8080"
    volumes:
      - ./data/Sample_Audio:/app/data/Sample_Audio
      - ./models/DeepSeek-R1-Distill-Qwen-1.5B:/models/DeepSeek-R1-Distill-Qwen-1.5B
      - ./logs/Chatbot_Logs:/app/data/Chat_Dump
      - ./logs/backend server log:/app/logs
      - ./license:/app/license
    environment:
      - HOST_MAC=34:E1:2D:1A:79:80
    depends_on:
      - db
    networks:
      - ai-call-network
    restart: unless-stopped

  frontend:
    image: ai-powered-call-analysis-frontend
    container_name: ai_call_frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - ai-call-network
    restart: unless-stopped

  ai-main:
    image: ai-main
    container_name: ai_call_ai_main
    ports:
      - "8000:8000"
    volumes:
      - ./logs/Main:/app/logs/Main
      - ./data/Sample_Audio:/data/Sample_Audio
      - ./data/Transcriptions:/ai-call-center-analysis/data/Transcriptions
      - ./data/Translated:/ai-call-center-analysis/data/Translated
      - ./data/Call Scoring with llama:/ai-call-center-analysis/data/Call Scoring with llama
      - ./data/Tone_Analysis_Result:/ai-call-center-analysis/data/Tone_Analysis_Result
      - ./data/Sentiment:/ai-call-center-analysis/data/Sentiment
      - ./data/Sentence_Similarity:/ai-call-center-analysis/data/Sentence_Similarity
    depends_on:
      - db
      - ai-call-audio-chunking
      - ai-call-language-detection
      - ai-call-diarization
      - ai-call-transcription
      - ai-call-translation
      - ai-call-tone-analysis
      - ai-call-llama-scoring
      - ai-call-sentiment-analysis
      - ai-call-sentence-similarity
    networks:
      - ai-call-network
    restart: unless-stopped

  ai-call-audio-chunking:
    image: ai-call-chunking
    container_name: ai_call_audio_chunking
    ports:
      - "8001:8001"
    volumes:
      - ./data/Sample_Audio:/data/Sample_Audio
      - ./data/Audio_Chunks:/ai-call-center-analysis/data/Audio_Chunks
      - ./logs/Audio_chunk_log:/app/logs/Audio_chunk_log
    networks:
      - ai-call-network
    restart: unless-stopped

  ai-call-language-detection:
    image: ai-call-language-detection
    container_name: ai_call_language_detection
    ports:
      - "8002:8002"
    volumes:
      - ./data/Audio_Chunks:/ai-call-center-analysis/data/Audio_Chunks
      - ./data/Language_Detection_Results:/ai-call-center-analysis/data/Language_Detection_Results
      - ./models/Whisper-large-v3:/models/Whisper-large-v3
      - ./logs/Language_Detection:/app/logs/Language_Detection
    networks:
      - ai-call-network
    restart: unless-stopped

  ai-call-diarization:
    image: ai-call-diarization
    container_name: ai_call_diarization
    ports:
      - "8003:8003"
    volumes:
      - ./data/Sample_Audio:/data/Sample_Audio
      - ./data/diarization_output:/ai-call-center-analysis/data/diarization_output
      - ./logs/diarization:/app/logs/diarization
    networks:
      - ai-call-network
    restart: unless-stopped

  ai-call-transcription:
    image: ai-call-transcription
    container_name: ai_call_transcription
    ports:
      - "8004:8004"
    volumes:
      - ./models/seamless-m4t-v2-large:/models/seamless-m4t-v2-large
      - ./data/diarization_output:/ai-call-center-analysis/data/diarization_output
      - ./data/Transcriptions:/ai-call-center-analysis/data/Transcriptions
      - ./data/Language_Detection_Results:/ai-call-center-analysis/data/Language_Detection_Results
      - ./logs/Transcription:/app/logs/Transcription
      - ./logs/Seamless_Transcription:/app/logs/Seamless_Transcription
    depends_on:
      - ai-call-language-detection
      - ai-call-diarization
      - ai-call-nemo-transcription
    networks:
      - ai-call-network
    restart: unless-stopped

  ai-call-nemo-transcription:
    image: ai-call-nemo-transcription
    container_name: ai_call_nemo_transcription
    ports:
      - "8020:8020"
    volumes:
      - ./models/nemo:/models/nemo
      - ./data/diarization_output:/ai-call-center-analysis/data/diarization_output
      - ./data/Transcriptions:/ai-call-center-analysis/data/Transcriptions
      - ./logs/Nemo_Transcription:/app/logs/Nemo_Transcription
    networks:
      - ai-call-network
    restart: unless-stopped

  ai-call-translation:
    image: ai-call-translation
    container_name: ai_call_translation
    ports:
      - "8005:8005"
    volumes:
      - ./models/indictrans2-en-indic-1B:/models/indictrans2-en-indic-1B
      - ./data/Transcriptions:/ai-call-center-analysis/data/Transcriptions
      - ./data/Translated:/ai-call-center-analysis/data/Translated
      - ./data/Language_Detection_Results:/ai-call-center-analysis/data/Language_Detection_Results
      - ./logs/Translate:/app/logs/Translate
    depends_on:
      - ai-call-transcription
    networks:
      - ai-call-network
    restart: unless-stopped

  ai-call-tone-analysis:
    image: ai-call-tone-analysis
    container_name: ai_call_tone_analysis
    ports:
      - "8006:8006"
    volumes:
      - ./data/diarization_output:/ai-call-center-analysis/data/diarization_output
      - ./data/Tone_Analysis_Result:/ai-call-center-analysis/data/Tone_Analysis_Result
      - ./logs/Tone_Analysis:/app/logs/Tone_Analysis
    networks:
      - ai-call-network
    depends_on:
      - ai-call-diarization
    restart: unless-stopped
    
  ai-call-llama-scoring:
    image: ai-call-llama
    container_name: ai_call_llama_scoring
    ports:
      - "8007:8007"
    volumes:
      - ./models/Llama-3.2-3B-Instruct:/models/Llama-3.2-3B-Instruct
      - ./data/Translated:/ai-call-center-analysis/data/Translated
      - ./data/Call Scoring with llama:/ai-call-center-analysis/data/Call Scoring with llama
      - ./logs/Call_Scoring_with_llama:/app/logs/Call_Scoring_with_llama
    networks:
      - ai-call-network
    depends_on:
      - ai-call-translation
    restart: unless-stopped  

  ai-call-sentiment-analysis:
    image: aipoweredcallanalysis-sentimentanalysis
    container_name: ai_call_sentiment_analysis
    ports:
      - "8008:8008"
    volumes:
      - ./models/Google/muril-large-cased:/models/Google/muril-large-cased
      - ./data/Transcriptions:/ai-call-center-analysis/data/Transcriptions
      - ./data/Sentiment:/ai-call-center-analysis/data/Sentiment
      - ./logs/Sentiment:/app/logs/Sentiment
    networks:
      - ai-call-network
    depends_on:
      - ai-call-transcription
    restart: unless-stopped

  ai-call-sentence-similarity:
    image: aipoweredcallanalysis-sentencesimilarity
    container_name: ai_call_sentence_similarity
    ports:
      - "8009:8009"
    volumes:
      - ./models/Sentence Similarity/all-MiniLM-L6-v2:/models/Sentence_Similarity/all-MiniLM-L6-v2
      - ./data/Translated:/ai-call-center-analysis/data/Translated
      - ./data/Sentence_Similarity:/ai-call-center-analysis/data/Sentence_Similarity
      - ./logs/Sentence_Similarity:/app/logs/Sentence_Similarity
    networks:
      - ai-call-network
    depends_on:
      - ai-call-translation
    restart: unless-stopped

volumes:
  ai-call-db-data:
    name: ai-call-db-data

networks:
  ai-call-network:
    name: ai-call-network
    driver: bridge